<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found || Stackly ESports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--darker-bg);
      position: relative;
      overflow: hidden;
    }
    .error-container {
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .glitch {
      font-size: 10rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      position: relative;
      color: white;
      text-shadow: 0.05em 0 0 rgba(255,0,0,0.75),
                  -0.025em -0.05em 0 rgba(0,255,0,0.75),
                  0.025em 0.05em 0 rgba(0,0,255,0.75);
      animation: glitch 500ms infinite;
    }
    .error-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--secondary-color);
      margin-bottom: 1rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      animation: glow 2s ease infinite;
    }
    .error-msg {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      max-width: 500px;
    }
    .error-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 3rem;
    }
    .error-logo img { height: 40px; filter: drop-shadow(0 0 10px rgba(138,43,226,0.5)); }
    @keyframes glitch {
      0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
      14% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
      15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
      49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
      50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
      99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
      100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.75), -0.025em -0.025em 0 rgba(0,255,0,0.75), -0.025em -0.05em 0 rgba(0,0,255,0.75); }
    }
    @media (max-width: 768px) {
      .glitch { font-size: 5rem; }
    }
  </style>
</head>
<body>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <div class="error-container">
    <a href="index.html" class="error-logo">
      <img src="assets/images/logo.webp" alt="Stackly Logo">
      <span class="brand-text">Stackly</span>
    </a>
    <h1 class="glitch">404</h1>
    <div class="error-subtitle">System Error</div>
    <p class="error-msg">The page you are looking for has been disconnected from the mainframe. It may have been moved or deleted.</p>
    <a href="index.html" class="btn-primary">
      <i class="bi bi-arrow-left"></i> Return to Base
    </a>
  </div>
</body>
</html>
