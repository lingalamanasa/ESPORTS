<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register || Stackly ESports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 2rem 0;
    }
    .login-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
    }
    .login-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.15) blur(3px); }
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(11,12,16,0.85), rgba(0,240,255,0.1));
      z-index: 1;
    }

    .login-container {
      width: 100%;
      max-width: 500px;
      padding: 3.5rem;
      text-align: center;
      position: relative;
      z-index: 3;
      margin: auto;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .login-logo img { height: 50px; filter: drop-shadow(0 0 10px rgba(0,240,255,0.5)); }
    .login-title { font-size: 2rem; margin-bottom: 0.5rem; animation: glow 3s ease infinite; }
    .login-title span { color: var(--secondary-color); }
    .login-desc { color: var(--text-muted); margin-bottom: 2.5rem; }

    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .form-control {
      width: 100%; padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.5); border: 1px solid var(--border-color);
      border-radius: 8px; color: #fff; font-family: inherit;
      transition: var(--transition); outline: none;
    }
    .form-control:focus { border-color: var(--secondary-color); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
    select.form-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2300F0FF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1.5rem top 50%;
      background-size: 0.65rem auto;
      cursor: pointer;
    }
    select.form-control option { background: var(--dark-bg); color: var(--text-light); }
    
    .terms { display: flex; align-items: flex-start; gap: 0.8rem; text-align: left; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .terms input[type="checkbox"] { margin-top: 4px; accent-color: var(--secondary-color); cursor: pointer; }
    .terms a { color: var(--secondary-color); text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    .btn-login { width: 100%; justify-content: center; margin-top: 0.5rem; padding: 1rem; }
    .login-footer { margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted); }
    .login-footer a { color: var(--primary-light); transition: var(--transition); font-weight: 600; }
    .login-footer a:hover { color: var(--primary-color); text-decoration: underline; text-shadow: 0 0 10px rgba(138,43,226,0.3); }

    .back-btn {
      position: fixed; top: 30px; left: 30px; z-index: 10;
      color: var(--text-muted); font-size: 1.5rem;
      transition: var(--transition);
      background: var(--card-bg); width: 45px; height: 45px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border-color);
    }
    .back-btn:hover { color: var(--secondary-color); border-color: var(--secondary-color); transform: translateX(-5px); }

    /* Fix for small screens to ensure form fits */
    @media (max-width: 480px) {
      .login-container { padding: 2rem 1.5rem; margin: 4rem auto; }
      .form-row { flex-direction: column; gap: 0; }
      .back-btn { top: 15px; left: 15px; width: 35px; height: 35px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="login-bg"><img src="assets/images/gaming-setup.webp" alt="Setup"></div>
  <div class="login-overlay"></div>
  <div class="particles" style="z-index: 2; position: fixed;">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <a href="index.html" class="back-btn" title="Back to Home"><i class="bi bi-arrow-left"></i></a>

  <div class="glass-card login-container fade-up">
    <a href="index.html" class="login-logo">
      <img src="assets/images/logo.webp" alt="Stackly Logo">
      <span class="brand-text">Stackly</span>
    </a>
    
    <h2 class="login-title">Create <span>Account</span></h2>
    <p class="login-desc">Join the elite network of professional gamers.</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" class="form-control" placeholder="Alex" required>
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" class="form-control" placeholder="Chen" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="username">Gamer Tag</label>
        <input type="text" id="username" class="form-control" placeholder="Vortex" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="player@stackly.gg" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <div class="form-group">
        <label for="roleSelect">Account Type</label>
        <select id="roleSelect" class="form-control">
          <option value="player">Player / Competitor</option>
          <option value="admin">Team Manager / Admin</option>
        </select>
      </div>

      <div class="terms">
        <input type="checkbox" id="terms" required>
        <label for="terms" style="text-transform: none; font-weight: normal; font-size: 0.85rem; margin: 0;">I agree to the Stackly <a href="error.html">Terms of Service</a> and <a href="error.html">Privacy Policy</a>.</label>
      </div>
      
      <button type="submit" class="btn-primary btn-login"><i class="bi bi-person-plus"></i> Initialize Account</button>
    </form>

    <div class="login-footer">
      <p>Already have an access key? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
